site_name: EP's Blog
site_description: 技术与生活的博客
site_author: epepepelephant
site_url: https://epepepe.top
repo_url: https://github.com/epepepelephant/ep_blog
repo_name: epepepelephant/ep_blog
copyright: '&copy; 2026 epepepelephant. All rights reserved.'

# 自定义图标
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/epepepelephant
  search:
    separator: '[\s\-\.]'

theme:
  name: material
  custom_dir: docs/overrides
  language: zh
  logo: assets/images/favicon.ico
  icon:
    logo: material/pencil
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    # - navigation.instant
    # - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - search.highlight
    - search.suggest

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - codehilite:
      css_class: highlight
      linenums: false
  # Removed pymdownx.arithmatex

plugins:
  - search:
      lang: zh

extra_css:
  - stylesheets/custom.css
  - javascripts/katex/katex.min.css

extra_javascript:
  - javascripts/favicon.js
  - javascripts/katex/katex.min.js
  - javascripts/katex/auto-render.min.js
  - javascripts/katex-render.js

nav:
  - Home: index.md
  - AI:
    - 神经网络: ai/神经网络.md
    - CNN: ai/CNN.md
    - RNN: ai/RNN.md
    - Pytorch: ai/Pytorch.md
    - 目标检测的发展史: ai/目标检测的发展史.md

docs_dir: docs
site_dir: site